defaults:
  - base
  - _self_

command: 
  - "/time set night"

task_conf:
  - name: "glass"
    text: "craft_item:glass" 

reward_conf:
  - event: "craft_item"
    max_reward_times: 1
    reward: 1.0
    objects: 
      - "glass"
    identity: "glass"
  
init_inventory: 
  - slot: 0
    type: furnace
    quantity: 1

  - slot: "random"
    type: coal
    quantity: "10>="

  - slot:  "random"
    type: sand
    quantity: "10>="

need_furnace: True
need_gui: True

worker:
  "smelt"