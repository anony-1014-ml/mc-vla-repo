defaults:
  - base
  - _self_

seed: 2025

command: 
  # - "/time set night"
  - '/tp @s 194 61 897'
    
task_conf:
  - name: "iron_ore"
    text: "mine_block:iron_ore" 
    task_id: 12
  - name: "iron_ingot"
    text: "craft_item:iron_ingot" 
    task_id: 17

reward_conf:
  - event: "mine_block"
    max_reward_times: 100
    reward: 0.1
    objects: 
      - "iron_ore"
    identity: "mine iron_ore"
  - event: "craft_item"
    max_reward_times: 100
    reward: 1.0
    objects: 
      - "iron_ingot"
    identity: "craft iron_ingot"

init_inventory: 
  - slot: 0
    type: "stone_pickaxe"
    quantity: 1

  - slot: 1
    type: "furnace"
    quantity: 1

  - slot: 2
    type: "coal"
    quantity: ">24"
  - slot: "random"
    type: "coal"
    quantity: ">24"