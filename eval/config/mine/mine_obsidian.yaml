defaults:
  - base
  - _self_

seed: 2025

command: 
  - "/time set night"
  - '/tp @s 345 70 989'

task_conf:
  - name: "mine"
    text: "mine_block:obsidian" 

reward_conf:
  - event: "mine_block"
    max_reward_times: 1
    reward: 1.0
    objects: 
      - "obsidian"
    identity: "mine obsidian"

init_inventory: 
  - slot: 0
    type: "diamond_pickaxe"
    quantity: 1
  - slot: 1
    type: "diamond_pickaxe"
    quantity: 1
