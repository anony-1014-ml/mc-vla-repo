defaults:
  - base
  - _self_

seed: 2025

command: 
  - "/time set night"
  - '/tp @s 194 61 897'

task_conf:
  - name: "mine"
    text: "mine_block:iron_ore" 

reward_conf:
  - event: "mine_block"
    max_reward_times: 1
    reward: 1.0
    objects: 
      - "iron_ore"
    identity: "mine iron_ore"

init_inventory: 
  - slot: 0
    type: "iron_pickaxe"
    quantity: 1
  - slot: 1
    type: "iron_shovel"
    quantity: 1
