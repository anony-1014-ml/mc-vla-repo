defaults:
  - base
  - _self_

seed: 2025

command: 
  - "/time set night"
  - '/tp @s 398 80 1122'

task_conf:
  - name: "mine"
    text: "mine_block:dirt" 

reward_conf:
  - event: "mine_block"
    max_reward_times: 1
    reward: 1.0
    objects: 
      - "dirt"
    identity: "mine dirt"

init_inventory: 
  - slot: 0
    type: "iron_pickaxe"
    quantity: 1
  - slot: 1
    type: "iron_shovel"
    quantity: 1
