defaults:
  - base
  - _self_

seed: 114514

command: 
  - "/time set night"
  - '/tp @s -613 70 -1137'

task_conf:
  - name: "mine"
    text: "mine_block:dark_oak_log" 

reward_conf:
  - event: "mine_block"
    max_reward_times: 1
    reward: 1.0
    objects: 
      - "dark_oak_log"
    identity: "mine dark_oak_log"

init_inventory: 
  - slot: 0
    type: "iron_pickaxe"
    quantity: 1
  - slot: 1
    type: "iron_shovel"
    quantity: 1
