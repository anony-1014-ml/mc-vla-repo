defaults:
  - base
  - _self_

command: 
  - "/time set night"

task_conf:
  - name: "iron_pickaxe"
    text: "craft_item:iron_pickaxe" 

reward_conf:
  - event: "craft_item"
    max_reward_times: 1
    reward: 1.0
    objects: 
      - "iron_pickaxe"
    identity: "iron_pickaxe"
  
init_inventory: 
  - slot: 0
    type: crafting_table
    quantity: 1

  - slot: "random"
    type: iron_ingot
    quantity: "10>="

  - slot:  "random"
    type: stick
    quantity: "10>="

need_crafting_table: True
need_gui: True

inventory_distraction_level: "zero"