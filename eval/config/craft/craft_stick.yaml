defaults:
  - base
  - _self_

command: 
  - "/time set night"

task_conf:
  - name: "stick"
    text: "craft_item:stick" 

reward_conf:
  - event: "craft_item"
    max_reward_times: 1
    reward: 1.0
    objects: 
      - "stick"
    identity: "craft stick"
  
init_inventory: 
  - slot: "random"
    type: "oak_planks"
    quantity: ">3"
  - slot: "random"
    type: "dark_oak_planks"
    quantity: ">3"

need_crafting_table: False
need_gui: True

inventory_distraction_level: "zero"