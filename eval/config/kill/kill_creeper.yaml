defaults:
  - base
  - _self_

command: 
  - "/time set night"

task_conf:
  - name: "kill_entity"
    text: "kill_entity:creeper" 

reward_conf:
  - event: "kill_entity"
    max_reward_times: 1
    reward: 1.0
    objects: 
      - "creeper"
    identity: "kill creeper"

mobs: 
  - name: "creeper"
    number: 1
    range_x:  [-2, 2]
    range_z:  [3, 10]

init_inventory:
  - slot: 0
    type: "diamond_sword"
    quantity: 1
  - slot: 1
    type: "golden_apple"
    quantity: 4
